# tecDESK - Produção com PostgreSQL externo (host)
# Uso: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Configure no .env:
#   DB_HOST=host.docker.internal  (Linux: use extra_hosts abaixo)
#   DB_PORT=5432
#   DB_DATABASE=zendesk_ai
#   DB_USERNAME=seu_usuario
#   DB_PASSWORD=sua_senha

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tecdesk-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      - DB_CONNECTION=pgsql
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5437}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=database
    env_file:
      - .env
    volumes:
      - ./.env:/var/www/html/.env
      - storage_logs:/var/www/html/storage/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_started
    networks:
      - tecdesk

  redis:
    image: redis:7-alpine
    container_name: tecdesk-redis
    restart: unless-stopped
    # Sem ports - app conecta via rede interna (redis:6379); evita conflito com Redis no host
    volumes:
      - redis_data:/data
    networks:
      - tecdesk

volumes:
  redis_data:
  storage_logs:

networks:
  tecdesk:
    driver: bridge
