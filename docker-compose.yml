services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tecdesk-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE:-zendesk_ai}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=database
    env_file:
      - .env
    volumes:
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - tecdesk

  postgres:
    image: pgvector/pgvector:pg17
    container_name: tecdesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zendesk_ai}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tecdesk

  redis:
    image: redis:7-alpine
    container_name: tecdesk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tecdesk

volumes:
  postgres_data:
  redis_data:
  storage_logs:

networks:
  tecdesk:
    driver: bridge
